<!doctype html>
<!-- Source artwork for the VerseCast app icon. Rendered to PNG via headless
     Chrome, then packed into icon.icns with sips + iconutil. -->
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; padding: 0; background: transparent; }
      svg { display: block; }
    </style>
  </head>
  <body>
    <svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Calm ocean-navy background, matching the app's BLUE_BG. -->
        <radialGradient id="bg" cx="50%" cy="0%" r="120%">
          <stop offset="0%" stop-color="#1b4a8c" />
          <stop offset="38%" stop-color="#13315c" />
          <stop offset="72%" stop-color="#0b2545" />
          <stop offset="100%" stop-color="#0a1633" />
        </radialGradient>
        <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ffffff" />
          <stop offset="100%" stop-color="#e7edf7" />
        </linearGradient>
        <radialGradient id="glow" cx="50%" cy="42%" r="55%">
          <stop offset="0%" stop-color="#ffd34d" stop-opacity="0.55" />
          <stop offset="60%" stop-color="#ffd34d" stop-opacity="0.10" />
          <stop offset="100%" stop-color="#ffd34d" stop-opacity="0" />
        </radialGradient>
        <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
          <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#04101f" flood-opacity="0.45" />
        </filter>
      </defs>

      <!-- Rounded-square (squircle-ish) base with transparent corners. -->
      <rect x="48" y="48" width="928" height="928" rx="212" fill="url(#bg)" />
      <rect x="48" y="48" width="928" height="928" rx="212" fill="none"
            stroke="#ffffff" stroke-opacity="0.06" stroke-width="2" />

      <!-- Warm glow behind the artwork. -->
      <rect x="48" y="48" width="928" height="928" rx="212" fill="url(#glow)" />

      <!-- "Cast" signal: source dot + three radiating arcs above the book. -->
      <g fill="none" stroke="#ffd34d" stroke-width="30" stroke-linecap="round">
        <path d="M 404 300 Q 512 236 620 300" />
        <path d="M 356 256 Q 512 168 668 256" opacity="0.85" />
        <path d="M 308 214 Q 512 104 716 214" opacity="0.62" />
      </g>
      <circle cx="512" cy="330" r="22" fill="#ffd34d" />

      <!-- Open book. -->
      <g filter="url(#soft)">
        <!-- soft contact shadow under the book -->
        <ellipse cx="512" cy="742" rx="300" ry="34" fill="#04101f" opacity="0.35" />
        <!-- left page -->
        <path d="M512 452
                 C 458 414 366 396 282 396
                 C 240 396 206 402 178 412
                 L 178 700
                 C 206 690 240 684 282 684
                 C 366 684 458 702 512 740 Z"
              fill="url(#page)" />
        <!-- right page -->
        <path d="M512 452
                 C 566 414 658 396 742 396
                 C 784 396 818 402 846 412
                 L 846 700
                 C 818 690 784 684 742 684
                 C 658 684 566 702 512 740 Z"
              fill="url(#page)" />
        <!-- spine -->
        <path d="M512 452 L512 740" stroke="#b9c4d6" stroke-width="6" stroke-linecap="round" />
        <!-- text lines -->
        <g stroke="#cfd8e8" stroke-width="13" stroke-linecap="round">
          <path d="M250 470 H452" />
          <path d="M232 522 H452" />
          <path d="M232 574 H452" />
          <path d="M232 626 H440" />
          <path d="M572 470 H774" />
          <path d="M572 522 H792" />
          <path d="M572 574 H792" />
          <path d="M584 626 H792" />
        </g>
      </g>

      <!-- Amber bookmark ribbon. -->
      <path d="M512 452 L512 792 L484 760 L456 792 L456 452 Z" fill="#ffd34d" opacity="0.0" />
      <path d="M620 396 L620 690 L592 660 L564 690 L564 404 Z" fill="#ffb627" />
    </svg>
  </body>
</html>
